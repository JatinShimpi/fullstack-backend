<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invoice Details - Dark</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #111827;
            color: #f3f4f6;
        }

        .glass {
            background: rgba(30, 41, 59, 0.95);
            backdrop-filter: blur(8px);
            border: 1px solid #374151
        }

        .status-badge {
            padding: 4px 10px;
            border-radius: 12px;
            font-weight: 500;
            font-size: 0.85rem;
        }

        .bg-paid {
            background-color: #065f46;
            color: #d1fae5
        }

        .bg-draft {
            background-color: #92400e;
            color: #fef3c7;
        }
    </style>
</head>

<body class="min-h-screen py-10">

    <div class="max-w-4xl mx-auto glass shadow-xl rounded-xl overflow-hidden pb-10" id="app">
        <!-- Header -->
        <div class="border-b border-gray-700 p-8 flex justify-between items-center relative">
            <div class="absolute top-0 left-0 w-full h-1 bg-blue-500"></div>
            <div>
                <h1 class="text-3xl font-bold text-gray-100" id="inv-number">Loading...</h1>
                <p class="text-gray-500 mt-1" id="inv-customer">...</p>
            </div>
            <div class="text-right flex flex-col items-end gap-2">
                <span id="inv-status" class="status-badge bg-draft">DRAFT</span>
                <div class="text-sm text-gray-400 mt-2">
                    <p><strong>Issue Date:</strong> <span id="inv-issue">--</span></p>
                    <p><strong>Due Date:</strong> <span id="inv-due">--</span></p>
                </div>
            </div>
        </div>

        <!-- Line Items Section -->
        <div class="p-8">
            <h2 class="text-xl font-semibold mb-4 text-gray-300 border-b border-gray-700 pb-2">Line Items</h2>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="text-gray-400 text-sm border-b border-gray-700">
                            <th class="py-3 px-4 font-medium">Description</th>
                            <th class="py-3 px-4 font-medium text-right">Qty</th>
                            <th class="py-3 px-4 font-medium text-right">Unit Price</th>
                            <th class="py-3 px-4 font-medium text-right">Line Total</th>
                        </tr>
                    </thead>
                    <tbody id="line-items-body">
                        <!-- Dynamic -->
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Totals & Payments Section -->
        <div class="p-8 grid grid-cols-2 gap-8 border-t border-b border-gray-700 bg-gray-800 bg-opacity-50">
            <!-- Payments Info -->
            <div>
                <div class="flex justify-between items-center mb-4 border-b border-gray-600 pb-2">
                    <h2 class="text-xl font-semibold text-gray-300">Payments</h2>
                    <button onclick="openPaymentModal()"
                        class="text-sm bg-blue-500 hover:bg-blue-600 text-white py-1 px-3 rounded transition">+ Add
                        Payment</button>
                </div>
                <ul id="payments-list" class="space-y-2 text-sm text-gray-400">
                    <!-- Dynamic -->
                    <li class="italic text-gray-500">No payments verified yet.</li>
                </ul>
            </div>

            <!-- Totals Info -->
            <div class="space-y-3">
                <div class="flex justify-between text-gray-400">
                    <span>Total Amount:</span>
                    <span class="font-medium" id="lbl-total">$0.00</span>
                </div>
                <div class="flex justify-between text-gray-400">
                    <span>Amount Paid:</span>
                    <span class="font-medium text-green-400" id="lbl-paid">$0.00</span>
                </div>
                <div class="flex justify-between text-xl font-bold text-gray-200 pt-3 border-t border-gray-600">
                    <span>Balance Due:</span>
                    <span id="lbl-balance">$0.00</span>
                </div>
            </div>
        </div>

    </div>

    <!-- Payment Modal -->
    <div id="payment-modal"
        class="fixed inset-0 bg-black bg-opacity-70 hidden flex justify-center items-center backdrop-blur-sm z-50">
        <div class="bg-gray-800 p-6 rounded shadow-2xl w-96 border border-gray-700" id="payment-modal-content">
            <h3 class="text-lg font-bold mb-4 text-gray-200">Add Payment</h3>
            <label class="block text-sm text-gray-400 mb-1">Amount</label>
            <input type="number" id="payment-amount"
                class="w-full bg-gray-900 border border-gray-700 text-white rounded p-2 mb-4 focus:ring-1 focus:ring-blue-500 outline-none"
                placeholder="0.00" step="0.01">

            <p class="text-xs text-red-400 hidden mb-3" id="payment-error"></p>

            <div class="flex justify-end gap-2">
                <button onclick="closePaymentModal()"
                    class="px-3 py-2 text-gray-400 hover:bg-gray-700 rounded">Cancel</button>
                <button onclick="submitPayment()"
                    class="px-4 py-2 bg-blue-500 hover:bg-blue-600 text-white rounded">Submit</button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'https://fullstack-backend-kodt.onrender.com/api';
        let currentInvoiceId = null;

        async function init() {
            try {
                // Check for valid invoice logic, assume ID 1 natively for testing.
                let res = await fetch(`${API_BASE}/invoices/1`);

                if (res.status === 404) {
                    // Let's seed initial data if none exists
                    const seedReq = await fetch(`${API_BASE}/invoices/seed`, { method: 'POST' });
                    const seedRes = await seedReq.json();
                    currentInvoiceId = seedRes.invoiceId;
                    res = await fetch(`${API_BASE}/invoices/${currentInvoiceId}`);
                } else {
                    currentInvoiceId = 1;
                }

                const invoice = await res.json();
                renderInvoice(invoice);
            } catch (err) {
                console.error('Failed init:', err);
            }
        }

        function renderInvoice(data) {
            document.getElementById('inv-number').innerText = data.invoiceNumber;
            document.getElementById('inv-customer').innerText = data.customerName;
            document.getElementById('inv-issue').innerText = data.issueDate;
            document.getElementById('inv-due').innerText = data.dueDate;

            const statusEl = document.getElementById('inv-status');
            statusEl.innerText = data.status;
            statusEl.className = `status-badge ${data.status === 'PAID' ? 'bg-paid' : 'bg-draft'}`;

            // Totals
            document.getElementById('lbl-total').innerText = `$${data.total.toFixed(2)}`;
            document.getElementById('lbl-paid').innerText = `$${data.amountPaid.toFixed(2)}`;
            document.getElementById('lbl-balance').innerText = `$${data.balanceDue.toFixed(2)}`;

            // Line Items
            const linesHtml = data.lines.map(l => `
            <tr class="border-b border-gray-700 hover:bg-gray-800">
                <td class="py-3 px-4 text-gray-300">${l.description}</td>
                <td class="py-3 px-4 text-right text-gray-300">${l.quantity}</td>
                <td class="py-3 px-4 text-right text-gray-300">$${l.unitPrice.toFixed(2)}</td>
                <td class="py-3 px-4 text-right font-medium text-gray-200">$${(l.quantity * l.unitPrice).toFixed(2)}</td>
            </tr>
        `).join('');
            document.getElementById('line-items-body').innerHTML = linesHtml;

            // Payments
            if (data.payments && data.payments.length > 0) {
                document.getElementById('payments-list').innerHTML = data.payments.map(p => `
                <li class="flex justify-between items-center py-1">
                    <span class="text-gray-400">Payment on ${p.paymentDate}</span>
                    <span class="font-medium text-green-400">+$${p.amount.toFixed(2)}</span>
                </li>
            `).join('');
            }
        }

        function openPaymentModal() {
            document.getElementById('payment-modal').classList.remove('hidden');
        }

        function closePaymentModal() {
            document.getElementById('payment-modal').classList.add('hidden');
            document.getElementById('payment-error').classList.add('hidden');
        }

        async function submitPayment() {
            const amount = parseFloat(document.getElementById('payment-amount').value);
            const errEl = document.getElementById('payment-error');

            if (!amount || amount <= 0) {
                errEl.innerText = 'Amount must be greater than 0';
                errEl.classList.remove('hidden');
                return;
            }

            try {
                const res = await fetch(`${API_BASE}/invoices/${currentInvoiceId}/payments`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ amount })
                });
                const result = await res.json();

                if (!res.ok) {
                    errEl.innerText = result.error || 'Payment failed';
                    errEl.classList.remove('hidden');
                } else {
                    closePaymentModal();
                    init(); // Reload invoice
                }
            } catch (err) {
                console.error(err);
            }
        }

        init();
    </script>
</body>

</html>
